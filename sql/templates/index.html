<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Home{% endblock %}</title>
</head>
<body>
    <h1>ToDo list</h1>
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('ping') }}">Ping</a>
    <a href="{{ url_for('list') }}">List tasks</a>
    <header>
    {% block content %}
    <p>Witaj w aplikacji ToDo List</p>
    {% endblock %}
    </header>
    {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            <ul class="flashes">
            {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
</body>
</html>
